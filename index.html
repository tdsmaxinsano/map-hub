<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Clinician Map (Custom Style)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet" />

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>

<body>
<div id="map"></div>

<script>
    // � MAPBOX TOKEN
    mapboxgl.accessToken = 'pk.eyJ1IjoiZGl6dG9ueTY3IiwiYSI6ImNtbjVjNW1seTA4dWsycXBpbjRreHVoOHQifQ.7wgw3ocLrvjEmpKdx-vP1A';

    // � SUPABASE
    const supabaseUrl = 'https://jpemlcuxjvynlbeygukb.supabase.co';
    const supabaseKey = 'sb_publishable_C7GdOG7L64y92IDDreglcQ_C0jNcbhl';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // �️ INITIALIZE MAP WITH YOUR CUSTOM STYLE
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/diztony67/cmn95ctde001j01qug5odd9ce', // Your Custom Style
        center: [-87.6298, 41.8781],
        zoom: 13
    });

    // ✏️ EDIT FUNCTION
    function editClinician(id, address, radius, zips) {
        const newAddress = prompt("Edit address:", address);
        const newRadius = prompt("Edit radius:", radius);
        const newZips = prompt("Edit preferred zips:", zips);

        if (newAddress === null) return;
        updateClinician(id, newAddress, newRadius, newZips);
    }

    // ⬆️ UPDATE FUNCTION
    async function updateClinician(id, address, radius, preferred_zips) {
        const { data, error } = await supabaseClient
            .from('clinician_v2')
            .update({
                address: address,
                radius: radius,
                preferred_zips: preferred_zips
            })
            .eq('id', id);

        if (error) {
            alert("❌ Update failed");
            console.error(error);
            return;
        }

        alert("✅ Updated!");
        location.reload();
    }

    // � LOAD DATA
    async function loadClinicians() {
        const { data, error } = await supabaseClient
            .from('clinician_v2')
            .select('*');

        if (error || !data) {
            console.error("Error loading data:", error);
            return;
        }

        data.forEach(c => {
            const popup = new mapboxgl.Popup().setHTML(`
                <strong>${c.name}</strong><br/>
                ${c.address}<br/>
                � ${c.radius || ''}<br/><br/>
                <button onclick="editClinician('${c.id}', \`${c.address || ''}\`, \`${c.radius || ''}\`, \`${c.preferred_zips || ''}\`)">
                    ✏️ Edit
                </button>
            `);

            new mapboxgl.Marker()
                .setLngLat([c.lng, c.lat])
                .setPopup(popup)
                .addTo(map);
        });
    }

    // ▶️ RUN AFTER STYLE LOADS
    // Using 'style.load' ensures the map is ready for markers even if it's a heavy custom style
    map.on('style.load', () => {
        console.log("Style loaded successfully!");
        loadClinicians();
    });

</script>
</body>
</html>
